name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Restore
        run: dotnet restore Odisea.sln

      - name: Build
        run: dotnet build Odisea.sln --no-restore -c Release

      - name: Test
        run: dotnet test Odisea.sln --no-build -c Release --logger "console;verbosity=normal"

  components:
    name: Lit components (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/components
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Test (contract spec)
        run: npm test

  portal:
    name: Angular portal (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/portal
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/portal/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npx ng build --configuration=production
